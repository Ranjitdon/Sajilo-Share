<script>
        // Simple Input Auto-focus Logic
        const inputs = document.querySelectorAll('.digit-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Micro-interaction for the button
        const joinBtn = document.querySelector('button.bg-primary');
        joinBtn.addEventListener('click', () => {
            joinBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Joining...';
            setTimeout(() => {
                document.getElementById('error-msg').classList.remove('hidden');
                joinBtn.innerHTML = 'Join Room <span class="material-symbols-outlined">chevron_right</span>';
            }, 1500);
        });
