<script>
        const amountInput = document.getElementById('amountInput');
        const splitCheckboxes = document.querySelectorAll('.split-checkbox');
        const splitPreview = document.getElementById('splitPreview');
        const categoryChips = document.querySelectorAll('.category-chip');
        const memberSelectors = document.querySelectorAll('.member-selector');

        function updateSplit() {
            const amount = parseFloat(amountInput.value) || 0;
            const checkedCount = Array.from(splitCheckboxes).filter(cb => cb.checked).length;
            
            if (checkedCount === 0) {
                splitPreview.textContent = '₹0 per person';
                return;
            }
            
            const perPerson = (amount / checkedCount).toFixed(2);
            splitPreview.textContent = `₹${perPerson} per person`;
            
            // Animation effect for preview
            splitPreview.classList.add('scale-110');
            setTimeout(() => splitPreview.classList.remove('scale-110'), 200);
        }

        amountInput.addEventListener('input', updateSplit);
        splitCheckboxes.forEach(cb => cb.addEventListener('change', updateSplit));

        // Category Selection Logic
        categoryChips.forEach(chip => {
            chip.addEventListener('click', () => {
                categoryChips.forEach(c => {
                    c.classList.remove('bg-primary-container', 'text-on-primary-container', 'border-primary');
                    c.classList.add('bg-surface-container-high', 'text-on-surface-variant', 'border-transparent');
                    c.querySelector('.material-symbols-outlined').classList.remove('filled-icon');
                });
                chip.classList.add('bg-primary-container', 'text-on-primary-container', 'border-primary');
                chip.classList.remove('bg-surface-container-high', 'text-on-surface-variant', 'border-transparent');
                chip.querySelector('.material-symbols-outlined').classList.add('filled-icon');
            });
        });

        // Member Selector Logic (Paid By)
        memberSelectors.forEach(selector => {
            selector.addEventListener('click', () => {
                memberSelectors.forEach(s => {
                    const imgContainer = s.querySelector('div');
                    const text = s.querySelector('span');
                    const img = s.querySelector('img');
                    
                    imgContainer.classList.remove('border-primary', 'ring-2', 'ring-primary-container', 'border-4');
                    imgContainer.classList.add('border-2', 'border-transparent');
                    text.classList.remove('text-primary', 'font-semibold');
                    text.classList.add('text-on-surface-variant', 'font-medium');
                    img.classList.add('grayscale');
                });
                
                const activeImgContainer = selector.querySelector('div');
                const activeText = selector.querySelector('span');
                const activeImg = selector.querySelector('img');
                
                activeImgContainer.classList.add('border-primary', 'ring-2', 'ring-primary-container', 'border-4');
                activeImgContainer.classList.remove('border-2', 'border-transparent');
                activeText.classList.add('text-primary', 'font-semibold');
                activeText.classList.remove('text-on-surface-variant', 'font-medium');
                activeImg.classList.remove('grayscale');
            });
        });

        // Initial update
        updateSplit();

        // Save Button Interaction
        document.getElementById('saveButton').addEventListener('click', function() {
            this.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span>';
            setTimeout(() => {
                this.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Success';
                this.classList.replace('bg-primary', 'bg-secondary');
            }, 1000);
        });
    </script>
