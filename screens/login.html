<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FlatShare - Login</title>

                "on-primary": "#ffffff",

                "secondary": "#006c49",

                "on-surface-variant": "#464554",
                "outline": "#767586",
                "on-primary-container": "#fffbff",
                "on-secondary": "#ffffff",
                "on-secondary-fixed-variant": "#005236",
                "secondary-fixed": "#6ffbbe",
                "on-primary-fixed-variant": "#2f2ebe",
                "surface-variant": "#d3e4fe",

                "surface-tint": "#494bd6",

                "secondary-fixed-dim": "#4edea3",
                "tertiary-fixed-dim": "#ffb95f",

            "spacing": {

                "xs": "4px",
                "base": "8px",
                "lg": "24px",

            "fontFamily": {

          },

<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9ff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-focus-effect:focus-within label {
            transform: translateY(-24px) scale(0.85);
            color: #4648d4;
        }
        .m3-input:focus {
            outline: none;
            border-color: #4648d4;
            border-width: 2px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-container-margin">
<!-- Login Container -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl p-xl shadow-sm border border-neutral-100 flex flex-col items-center">
<!-- Branding Section -->
<header class="mb-xl text-center">
<div class="mb-sm flex justify-center">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center shadow-lg transform rotate-3">
<span class="material-symbols-outlined text-on-primary text-[40px]" data-icon="apartment">apartment</span>
</div>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight font-bold">FlatShare</h1>
<p class="font-body-sm text-on-surface-variant mt-xs">Simple roommate finance management</p>
</header>
<!-- Form Section -->
<form class="w-full space-y-lg">
<!-- Email Field -->
<div class="relative flex flex-col group input-focus-effect">
<input class="m3-input w-full h-14 px-md pt-4 bg-transparent border border-outline rounded-lg font-body-lg text-on-surface peer transition-all duration-200" id="email" placeholder=" " type="email"/>
<label class="absolute left-md top-4 font-body-lg text-on-surface-variant pointer-events-none transition-all duration-200 peer-placeholder-shown:translate-y-0 peer-focus:-translate-y-6 peer-focus:text-label-md peer-focus:bg-surface-container-lowest peer-focus:px-xs peer-[:not(:placeholder-shown)]:-translate-y-6 peer-[:not(:placeholder-shown)]:text-label-md peer-[:not(:placeholder-shown)]:bg-surface-container-lowest peer-[:not(:placeholder-shown)]:px-xs" for="email">
                    Email Address
                </label>
</div>
<!-- Password Field -->
<div class="relative flex flex-col group input-focus-effect">
<input class="m3-input w-full h-14 px-md pt-4 bg-transparent border border-outline rounded-lg font-body-lg text-on-surface peer transition-all duration-200" id="password" placeholder=" " type="password"/>
<label class="absolute left-md top-4 font-body-lg text-on-surface-variant pointer-events-none transition-all duration-200 peer-placeholder-shown:translate-y-0 peer-focus:-translate-y-6 peer-focus:text-label-md peer-focus:bg-surface-container-lowest peer-focus:px-xs peer-[:not(:placeholder-shown)]:-translate-y-6 peer-[:not(:placeholder-shown)]:text-label-md peer-[:not(:placeholder-shown)]:bg-surface-container-lowest peer-[:not(:placeholder-shown)]:px-xs" for="password">
                    Password
                </label>
<button class="absolute right-md top-4 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="font-label-md text-primary hover:underline" href="#">Forgot password?</a>
</div>
<!-- Action Buttons -->
<div class="space-y-md pt-base">
<button class="w-full h-12 bg-primary text-on-primary rounded-full font-label-md flex items-center justify-center gap-sm active:scale-95 transition-transform duration-150 shadow-md" type="submit">
                    Login
                </button>
<div class="relative flex items-center py-base">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-md font-label-md text-on-surface-variant">OR</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<button class="w-full h-12 border border-outline text-on-surface rounded-full font-label-md flex items-center justify-center gap-md hover:bg-surface-container transition-colors active:scale-95 duration-150" type="button">
<img class="w-5 h-5" data-alt="The official Google 'G' logo in its iconic four colors (red, yellow, green, and blue) centered on a clean white background, designed with sharp geometric precision for a professional fintech user interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBuKu5DL_uQqe4SvNo3OyenvEuM47aCbAVjf4hbMlebhYdYMAaYm30IcGUTu7Hu26wbbcyQbcxh_-UYTe9UfUG0xevGC5hZP8AJmrc7rDmo1d6bvauMb3Dhlq2CVy8bKx3YqkYQ9MNYtn_9NE-iTXbaWWvBMwtPlx-yWU7UWVWiRN6K8_s13DXNZa7fm1gcZlqi6LxjYmq2ODCfgUmsqHhhy9qSn4-ZlFlvMPUqwUrHxwJRazZUr0OFSlc9yHf5Flh8k1JuKK6-Z6Q"/>
                    Continue with Google
                </button>
</div>
</form>
<!-- Footer Link -->
<footer class="mt-xl text-center">
<p class="font-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-semibold hover:underline" href="#">Sign up</a>
</p>
</footer>
</main>
<!-- Visual Atmosphere (Subtle Background Detail) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-5%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[40%] h-[40%] rounded-full bg-secondary-container/10 blur-[120px]"></div>
</div>
<script>
        // Micro-interaction for the password visibility toggle
        const toggleBtn = document.querySelector('button .material-symbols-outlined[data-icon="visibility"]');
        const passInput = document.getElementById('password');
        
        if (toggleBtn) {
            toggleBtn.parentElement.addEventListener('click', () => {
                const isPassword = passInput.type === 'password';
                passInput.type = isPassword ? 'text' : 'password';
                toggleBtn.textContent = isPassword ? 'visibility_off' : 'visibility';
            });
        }

        // Form submission ripple simulation or simple feedback
        const form = document.querySelector('form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = form.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
            setTimeout(() => {
                btn.innerHTML = 'Login';
            }, 2000);
        });
    </script>
</body></html>
